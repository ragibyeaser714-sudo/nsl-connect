<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NSL Connect</title>

  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       SECTION 1 — CSS CUSTOM PROPERTIES (THEME VARIABLES)
    ============================================================ */
    [data-theme="dark"] {
      --bg:        #0b111e;
      --bg2:       #101726;
      --bg3:       #151f32;
      --panel:     #121b2d;
      --panel2:    #1a263f;
      --border:    #1f2f4a;
      --border2:   #2d4368;
      --accent:    #38bdf8;
      --accent2:   #0284c7;
      --accent3:   #34d399;
      --warn:      #f87171;
      --warn2:     rgba(248, 113, 113, 0.08);
      --text:      #e2e8f0;
      --text2:     #94a3b8;
      --text3:     #64748b;
      --shadow:    0 12px 32px rgba(3,7,18,0.5);
      --glow:      0 0 20px rgba(56,189,248,0.12);
      --grid-line: rgba(56,189,248,0.015);
      --header-bg: rgba(11,17,30,0.92);
    }

    [data-theme="light"] {
      --bg:        #f4f7fa;
      --bg2:       #e9eff5;
      --bg3:       #ffffff;
      --panel:     #ffffff;
      --panel2:    #f0f4f8;
      --border:    #d0dbe7;
      --border2:   #a1b5cc;
      --accent:    #0369a1;
      --accent2:   #0c4a6e;
      --accent3:   #15803d;
      --warn:      #b91c1c;
      --warn2:     rgba(185, 28, 28, 0.06);
      --text:      #0f172a;
      --text2:     #475569;
      --text3:     #64748b;
      --shadow:    0 6px 20px rgba(15,23,42,0.05);
      --glow:      0 0 14px rgba(3,105,161,0.08);
      --grid-line: rgba(3,105,161,0.025);
      --header-bg: rgba(244,247,250,0.94);
    }

    /* ============================================================
       SECTION 2 — RESET & BASE STYLES
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--header-bg);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-text { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.4rem; letter-spacing: 0.08em; color: var(--text); }
    .logo-text span { color: var(--accent); }
    .logo-sub { font-family: 'Share Tech Mono', monospace; font-size: 0.6rem; color: var(--text3); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 2px; }
    
    .header-right { display: flex; align-items: center; gap: 1.2rem; }
    .header-status { display: flex; align-items: center; gap: 6px; font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: var(--accent3); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent3); }

    .theme-toggle {
      width: 38px; height: 38px; border-radius: 50%; background: var(--panel); border: 1px solid var(--border); color: var(--text2); font-size: 1.05rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); background: var(--panel2); }

    .app { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }
    .view { display: none; }
    .view.active { display: block; }

    .page-header { margin-bottom: 2rem; display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
    .page-eyebrow { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
    .page-heading { font-family: 'Barlow Condensed', sans-serif; font-size: 2rem; font-weight: 700; color: var(--text); letter-spacing: 0.02em; }

    /* ============================================================
       SECTION 3 — MASTER DIRECTORY MATRIX VIEW
    ============================================================ */
    .directory-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .profile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.25rem; }
    
    .profile-card { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 1.25rem; cursor: pointer; transition: all 0.2s; }
    .profile-card:hover { border-color: var(--border2); background: var(--panel2); transform: translateY(-2px); box-shadow: var(--shadow); }
    .card-top { display: flex; align-items: center; gap: 0.85rem; margin-bottom: 0.8rem; }
    
    .avatar { width: 46px; height: 46px; border-radius: 4px; background: var(--bg3); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--accent); }
    .card-info { flex: 1; }
    .card-name { font-family: 'Barlow Condensed', sans-serif; font-size: 1.15rem; font-weight: 700; color: var(--text); line-height: 1.2; }
    .card-desig { font-size: 0.8rem; color: var(--text2); margin-top: 2px; }
    
    .card-footer { margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-btn { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; padding: 4px 10px; background: none; border: 1px solid var(--border); color: var(--text2); border-radius: 3px; cursor: pointer; }
    .card-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(56,189,248,0.05); }

    /* ============================================================
       SECTION 4 — PROFILE ANALYTICAL DETAIL VIEW
    ============================================================ */
    .back-btn { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: var(--text2); background: none; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .back-btn:hover { color: var(--accent); }

    .detail-header { display: flex; align-items: flex-start; gap: 1.5rem; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 1.5rem; margin-bottom: 1rem; position: relative; overflow: hidden; }
    .detail-header::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent3)); }
    .detail-avatar { width: 72px; height: 72px; border-radius: 6px; background: var(--bg3); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--accent); flex-shrink: 0; }
    
    .detail-section { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 1.5rem; margin-bottom: 1rem; }
    .detail-section-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border); }
    .detail-section-label { font-family: 'Share Tech Mono', monospace; font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); }
    
    .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.25rem; }
    .meta-item label { display: block; font-family: 'Share Tech Mono', monospace; font-size: 0.62rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
    .meta-item p { font-size: 0.9rem; color: var(--text); font-weight: 500; line-height: 1.4; }

    /* Core Data Table Layout */
    .table-responsive { width: 100%; overflow-x: auto; margin-top: 0.5rem; }
    .project-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.85rem; }
    .project-table th { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); padding: 10px 12px; border-bottom: 2px solid var(--border); background: var(--bg2); }
    .project-table td { padding: 12px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: top; line-height: 1.5; }
    .project-table tbody tr:hover { background: var(--panel2); }

    /* Actions Column Structural Elements */
    .btn-actions-cell { display: flex; gap: 6px; justify-content: center; }
    .btn-table-action { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; letter-spacing: 0.05em; padding: 4px 10px; border-radius: 3px; cursor: pointer; border: 1px solid var(--border); background: none; transition: all 0.15s; }
    .btn-table-edit { color: var(--accent); border-color: rgba(56,189,248,0.2); }
    .btn-table-edit:hover { background: rgba(56,189,248,0.1); border-color: var(--accent); }
    .btn-table-delete { color: var(--warn); border-color: rgba(248,113,113,0.2); }
    .btn-table-delete:hover { background: var(--warn2); border-color: var(--warn); }

    .btn-download-docx { font-family: 'Barlow Condensed', sans-serif; font-size: 0.82rem; font-weight: 700; letter-spacing: 0.08em; padding: 6px 14px; background: var(--accent3); color: #000; border: none; border-radius: 4px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
    .btn-download-docx:hover { filter: brightness(1.1); box-shadow: 0 0 12px rgba(52, 211, 153, 0.3); }

    /* Inline Text Modifiers */
    .editable-input { background: var(--bg3) !important; border: 1px solid var(--accent) !important; color: var(--text) !important; padding: 6px; border-radius: 3px; font-size: 0.85rem; width: 100%; outline: none; }
    .editable-textarea { background: var(--bg3) !important; border: 1px solid var(--accent) !important; color: var(--text) !important; padding: 6px; border-radius: 3px; font-size: 0.85rem; width: 100%; min-height: 70px; outline: none; resize: vertical; font-family: inherit; line-height: 1.4; }

    /* ============================================================
       SECTION 5 — TOAST NOTIFICATION WITH UNDO HOOK
    ============================================================ */
    #toast-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; pointer-events: none; }
    .toast-card { background: var(--panel); border: 1px solid var(--accent3); color: var(--accent3); padding: 12px 24px; border-radius: 4px; font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; box-shadow: var(--shadow); display: flex; align-items: center; gap: 16px; pointer-events: auto; animation: fadeUp 0.3s ease; }
    .toast-card.warn-toast { border-color: var(--warn); color: var(--warn); }
    .btn-undo { background: none; border: 1px solid currentColor; color: inherit; font-family: inherit; font-size: 0.7rem; padding: 2px 8px; border-radius: 2px; cursor: pointer; text-transform: uppercase; }
    .btn-undo:hover { background: rgba(255,255,255,0.08); }
    @keyframes fadeUp { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>
<body data-theme="dark">

  <header>
    <div class="logo">
      <div class="logo-text">NSL <span>CONNECT</span></div>
      <div class="logo-sub">Analog Layout Asset Sync</div>
    </div>
    <div class="header-right">
      <div class="header-status">
        <div class="status-dot"></div>
        <span>SECURE NODE</span>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()">◑</button>
    </div>
  </header>

  <div class="app">
    
    <div class="view active" id="directoryView">
      <div class="page-header">
        <div>
          <div class="page-eyebrow">SYNC PIPELINE · MASTER OVERVIEW</div>
          <div class="page-heading">Engineer Portfolios</div>
        </div>
      </div>
      <div class="directory-toolbar">
        <div style="font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; color: var(--text2);">
          Active Engineering Records: <span id="profileCount" style="color: var(--accent); font-weight: bold;">0</span> Loaded
        </div>
      </div>
      <div class="profile-grid" id="profileGridContainer"></div>
    </div>

    <div class="view" id="detailView">
      <button class="back-btn" onclick="navigateToDirectory()">◀ Return to Node Directory</button>
      <div class="profile-detail" id="profileDetailRoot"></div>
    </div>

  </div>

  <div id="toast-container"></div>

  <script>
    // In-memory array cache
    let profiles = [
      {
        id: "prof_ragib",
        name: "Ragib Yeaser",
        experience: "5 Years 5 Months",
        education: "Master of Science in Electrical and Computer Engineering",
        university: "North Carolina State University",
        expertise: "AMS Custom Layout, HV layout, FinFET Layout, MHC",
        circuitDesign: "Cadence Virtuoso Schematic Editor, ADE-L, ADE-XL, ADE Explorer, ADE Assembler, Spectre",
        layoutDesign: "Cadence Virtuoso Layout Editor (Tools: Layout-L, Layout-XL)",
        physVerification: "Assura, Calibre, Cypress, IC Validator, Pegasus, PVS",
        parasiticExtraction: "Assura, StarRC, QuantusRC (QRC)",
        reliabilityValidation: "Totem, EMX",
        projManagement: "ClioSoft SOS, ClearCase, ICM, VersIC",
        techNodes: "5nm, 7nm, 8nm, 16nm, 28nm, 40nm",
        foundries: "Samsung, Intel, TSMC, UMC, GF",
        processTech: "FinFET, BCD, FDSOI, Planar",
        projects: [
          { id: "p1", name: "Ring Oscillator", tech: "5nm, 8nm (FinFET)", duration: "4 Months", desc: "Designed high-frequency ring oscillator blocks from scratch. Block level layout assembly, transistor sizing, layout optimization for parasitics, matching layout tracks, and precision delay stages setup. Performed local physical verification cycles." },
          { id: "p2", name: "Low-Dropout (LDO) Regulator", tech: "28nm Planar / BCD", duration: "3 Months", desc: "Executed sub-block layout design and integration. Optimized heavy power transistors, error amplifiers, and network routing arrays for minimized IR-drop, EM protection, and structural offset matching." },
          { id: "p3", name: "Precision Bandgap Reference (BGR)", tech: "16nm FinFET", duration: "5 Months", desc: "Top-level design and block assembly. Focused closely on complex device symmetry, common-centroid matching, dummy placement configurations, and routing parasitic optimization to isolate noise paths." }
        ]
      }
    ];

    // Undo trace snapshots
    let projectDeleteBackup = null;
    let projectDeleteBackupIdx = -1;
    let projectDeleteOwnerId = null;

    function toggleTheme() {
      const current = document.body.getAttribute('data-theme');
      document.body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }

    function showToast(message, isWarn = false, undoAction = null) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast-card ${isWarn ? 'warn-toast' : ''}`;
      toast.innerHTML = `<span>${message}</span>`;
      
      if (undoAction) {
        const undoBtn = document.createElement('button');
        undoBtn.className = 'btn-undo';
        undoBtn.textContent = 'Undo';
        undoBtn.onclick = () => { undoAction(); toast.remove(); };
        toast.appendChild(undoBtn);
      }
      container.appendChild(toast);
      setTimeout(() => { if (toast) toast.remove(); }, 5000);
    }

    function navigateToDirectory() {
      document.getElementById('detailView').classList.remove('active');
      document.getElementById('directoryView').classList.add('active');
      renderDirectory();
    }

    function navigateToProfile(profileId) {
      document.getElementById('directoryView').classList.remove('active');
      document.getElementById('detailView').classList.add('active');
      renderProfileDetails(profileId);
    }

    function renderDirectory() {
      const container = document.getElementById('profileGridContainer');
      document.getElementById('profileCount').textContent = profiles.length;
      container.innerHTML = '';

      profiles.forEach(p => {
        const initials = p.name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
        const card = document.createElement('div');
        card.className = 'profile-card';
        card.onclick = () => navigateToProfile(p.id);
        card.innerHTML = `
          <div class="card-top">
            <div class="avatar">${initials}</div>
            <div class="card-info">
              <div class="card-name">${p.name}</div>
              <div class="card-desig">${p.experience} · Analog Layout Matrix</div>
            </div>
          </div>
          <div style="font-size:0.75rem; color:var(--text2); line-height:1.4;"><strong>Expertise:</strong> ${p.expertise}</div>
          <div class="card-footer">
            <span style="font-family:'Share Tech Mono',monospace; font-size:0.6rem; color:var(--text3);">${p.projects.length} Project Block Entries</span>
            <button class="card-btn">View Profile</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function renderProfileDetails(profileId) {
      const root = document.getElementById('profileDetailRoot');
      const p = profiles.find(item => item.id === profileId);
      if (!p) return;

      const initials = p.name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();

      root.innerHTML = `
        <div class="detail-header">
          <div class="detail-avatar">${initials}</div>
          <div class="detail-info">
            <div class="detail-name">${p.name}</div>
            <div class="detail-desig">Experience Parameters: ${p.experience}</div>
            <div class="detail-meta-text">Education: ${p.education} (${p.university})</div>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-section-title-row"><div class="detail-section-label">Engineer Meta Profile Attributes</div></div>
          <div class="meta-grid">
            <div class="meta-item"><label>Key Expertise</label><p>${p.expertise}</p></div>
            <div class="meta-item"><label>Circuit Design Tools</label><p>${p.circuitDesign}</p></div>
            <div class="meta-item"><label>Layout Design Tools</label><p>${p.layoutDesign}</p></div>
            <div class="meta-item"><label>Physical Verification</label><p>${p.physVerification}</p></div>
            <div class="meta-item"><label>Parasitic Extraction</label><p>${p.parasiticExtraction}</p></div>
            <div class="meta-item"><label>Reliability Validation</label><p>${p.reliabilityValidation}</p></div>
            <div class="meta-item"><label>Project Management Tools</label><p>${p.projManagement}</p></div>
            <div class="meta-item"><label>Technology Nodes</label><p>${p.techNodes}</p></div>
            <div class="meta-item"><label>Foundries Handled</label><p>${p.foundries}</p></div>
            <div class="meta-item"><label>Process Technologies</label><p>${p.processTech}</p></div>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-section-title-row">
            <div class="detail-section-label">Layout Project Experience</div>
            <button class="btn-download-docx" onclick="exportProfileToDocx('${p.id}')">📥 Download Profile (.docx)</button>
          </div>

          <div class="table-responsive">
            <table class="project-table">
              <thead>
                <tr>
                  <th style="width: 20%;">Project</th>
                  <th style="width: 15%;">Technology</th>
                  <th style="width: 45%;">Description</th>
                  <th style="width: 12%;">Duration</th>
                  <th style="width: 8%; text-align: center;">Actions</th>
                </tr>
              </thead>
              <tbody id="projectTableBody">
                ${p.projects.map(proj => `
                  <tr data-p-id="${proj.id}">
                    <td class="p-name">${proj.name}</td>
                    <td class="p-tech">${proj.tech}</td>
                    <td class="p-desc">${proj.desc}</td>
                    <td class="p-duration">${proj.duration}</td>
                    <td>
                      <div class="btn-actions-cell">
                        <button class="btn-table-action btn-table-edit" onclick="toggleEditProjectRow(this, '${p.id}', '${proj.id}')">Edit</button>
                        <button class="btn-table-action btn-table-delete" onclick="deleteProjectRow(this, '${p.id}', '${proj.id}')">Delete</button>
                      </div>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function toggleEditProjectRow(btn, profileId, projectId) {
      const row = btn.closest('tr');
      const p = profiles.find(item => item.id === profileId);
      const proj = p.projects.find(item => item.id === projectId);
      const isEditing = row.classList.contains('row-active-editing');

      if (!isEditing) {
        row.classList.add('row-active-editing');
        btn.textContent = "Save";
        btn.style.color = "var(--accent3)";
        btn.style.borderColor = "var(--accent3)";

        ['name', 'tech', 'desc', 'duration'].forEach(f => {
          const cell = row.querySelector(`.p-${f}`);
          if (f === 'desc') {
            cell.innerHTML = `<textarea class="editable-textarea">${proj.desc}</textarea>`;
          } else {
            cell.innerHTML = `<input type="text" class="editable-input" value="${proj[f].replace(/"/g, '&quot;')}">`;
          }
        });
      } else {
        const newName = row.querySelector('.p-name input').value.trim();
        const newTech = row.querySelector('.p-tech input').value.trim();
        const newDesc = row.querySelector('.p-desc textarea').value.trim();
        const newDuration = row.querySelector('.p-duration input').value.trim();

        if (!newName || !newTech) {
          showToast("Error: Project Name and Tech parameters cannot be blank.", true);
          return;
        }

        proj.name = newName;
        proj.tech = newTech;
        proj.desc = newDesc;
        proj.duration = newDuration;

        row.classList.remove('row-active-editing');
        btn.textContent = "Edit";
        btn.style.color = "var(--accent)";
        btn.style.borderColor = "rgba(56,189,248,0.2)";

        row.querySelector('.p-name').textContent = newName;
        row.querySelector('.p-tech').textContent = newTech;
        row.querySelector('.p-desc').textContent = newDesc;
        row.querySelector('.p-duration').textContent = newDuration;

        showToast("✓ Project properties committed successfully.");
      }
    }

    function deleteProjectRow(btn, profileId, projectId) {
      const p = profiles.find(item => item.id === profileId);
      const idx = p.projects.findIndex(item => item.id === projectId);
      if (idx === -1) return;

      projectDeleteBackup = p.projects[idx];
      projectDeleteBackupIdx = idx;
      projectDeleteOwnerId = profileId;

      p.projects.splice(idx, 1);
      renderProfileDetails(profileId);

      showToast(`✓ Deleted project entry: "${projectDeleteBackup.name}"`, true, undoProjectDeletion);
    }

    function undoProjectDeletion() {
      if (!projectDeleteBackup || !projectDeleteOwnerId) return;
      const p = profiles.find(item => item.id === projectDeleteOwnerId);
      p.projects.splice(projectDeleteBackupIdx, 0, projectDeleteBackup);
      
      renderProfileDetails(projectDeleteOwnerId);
      projectDeleteBackup = null;
      projectDeleteOwnerId = null;
      showToast("✓ Deletion reversed: Project layout structure restored.");
    }

    /**
     * ADVANCED OPENXML COMPILER PIPELINE (.DOCX)
     * Packages structural configuration profiles and tables matching image styles exactly.
     */
    function exportProfileToDocx(profileId) {
      const target = profiles.find(p => p.id === profileId);
      if (!target) return;

      const cleanXml = (str) => {
        return (str || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&apos;');
      };

      // 1. Structural Meta Info List Elements
      const metaItems = [
        { label: "Years of Experience", val: target.experience },
        { label: "Education Background", val: target.education },
        { label: "University", val: target.university },
        { label: "Key Expertise", val: target.expertise }
      ];

      let metaXmlBlock = '';
      metaItems.forEach(item => {
        metaXmlBlock += `
          <w:p>
            <w:pPr><w:spacing w:after="40"/><w:ind w:left="240" w:hanging="240"/></w:pPr>
            <w:r><w:rPr><w:rFonts w:ascii="Lato" w:hAnsi="Lato"/><w:b/><w:sz w:val="22"/></w:rPr><w:t>${cleanXml(item.label)}: </w:t></w:r>
            <w:r><w:rPr><w:rFonts w:ascii="Lato" w:hAnsi="Lato"/><w:sz w:val="22"/></w:rPr><w:t>${cleanXml(item.val)}</w:t></w:r>
          </w:p>
        `;
      });

      // 2. Technical Tools Section Matrices
      const toolingList = [
        { cat: "Circuit Design & Simulation", val: target.circuitDesign },
        { cat: "Layout Design", val: target.layoutDesign },
        { cat: "Physical Verification", val: target.physVerification },
        { cat: "Parasitic Extraction", val: target.parasiticExtraction },
        { cat: "Reliability Validation", val: target.reliabilityValidation },
        { cat: "Project Management", val: target.projManagement },
        { cat: "Technology", val: target.techNodes },
        { cat: "Foundry", val: target.foundries },
        { cat: "Process", val: target.processTech }
      ];

      let toolXmlBlock = '';
      toolingList.forEach(tool => {
        toolXmlBlock += `
          <w:p>
            <w:pPr><w:spacing w:after="40"/><w:ind w:left="240" w:hanging="240"/></w:pPr>
            <w:r><w:rPr><w:rFonts w:ascii="Lato" w:hAnsi="Lato"/><w:b/><w:sz w:val="22"/></w:rPr><w:t>${cleanXml(tool.cat)}: </w:t></w:r>
            <w:r><w:rPr><w:rFonts w:ascii="Lato" w:hAnsi="Lato"/><w:sz w:val="22"/></w:rPr><w:t>${cleanXml(tool.val)}</w:t></w:r>
          </w:p>
        `;
      });

      // 3. Project Experience Table Setup
      let tableRowsXml = '';

      // Header Row (Matches layout shading properties)
      tableRowsXml += `
        <w:tr>
          <w:trPr><w:tblHeader/><w:cantSplit/></w:trPr>
          <w:tc><w:tcPr><w:tcW w:w="2200" w:type="dxa"/><w:shd w:fill="F2F2F2"/><w:tcBorders><w:top w:val="single" w:sz="4" w:color="000000"/><w:bottom w:val="single" w:sz="12" w:color="000000"/><w:left w:val="none"/><w:right w:val="none"/></w:tcBorders></w:tcPr><w:p><w:pPr><w:jc w:val="left"/></w:pPr><w:r><w:rPr><w:rFonts w:ascii="Lato" w:hAnsi="Lato"/><w:b/><w:sz w:val="22"/></w:rPr><w:t>Project</w:t></w:r></w:p></w:tc>
          <w:tc><w:tcPr><w:tcW w:w="1600" w:type="dxa"/><w:shd w:fill="F2F2F2"/><w:tcBorders><w:top w:val="single" w:sz="4" w:color="000000"/><w:bottom w:val="single" w:sz="12" w:color="000000"/><w:left w:val="none"/><w:right w:val="none"/></w:tcBorders></w:tcPr><w:p><w:pPr><w:jc w:val="left"/></w:pPr><w:r><w:rPr><w:rFonts w:ascii="Lato" w:hAnsi="Lato"/><w:b/><w:sz w:val="22"/></w:rPr><w:t>Technology</w:t></w:r></w:p></w:tc>
          <w:tc><w:tcPr><w:tcW w:w="4700" w:type="dxa"/><w:shd w:fill="F2F2F2"/><w:tcBorders><w:top w:val="single" w:sz="4" w:color="000000"/><w:bottom w:val="single" w:sz="12" w:color="000000"/><w:left w:val="none"/><w:right w:val="none"/></w:tcBorders></w:tcPr><w:p><w:pPr><w:jc w:val="left"/></w:pPr><w:r><w:rPr><w:rFonts w:ascii="Lato" w:hAnsi="Lato"/><w:b/><w:sz w:val="22"/></w:rPr><w:t>Description</w:t></w:r></w:p></w:tc>
          <w:tc><w:tcPr><w:tcW w:w="1500" w:type="dxa"/><w:shd w:fill="F2F2F2"/><w:tcBorders><w:top w:val="single" w:sz="4" w:color="000000"/><w:bottom w:val="single" w:sz="12" w:color="000000"/><w:left w:val="none"/><w:right w:val="none"/></w:tcBorders></w:tcPr><w:p><w:pPr><w:jc w:val="left"/></w:pPr><w:r><w:rPr><w:rFonts w:ascii="Lato" w:hAnsi="Lato"/><w:b/><w:sz w:val="22"/></w:rPr><w:t>Duration</w:t></w:r></w:p></w:tc>
        </w:tr>
      `;

      // Append project detail records dynamically
      target.projects.forEach(proj => {
        tableRowsXml += `
          <w:tr>
            <w:trPr><w:cantSplit/></w:trPr>
            <w:tc><w:tcPr><w:tcW w:w="2200" w:type="dxa"/><w:tcBorders><w:bottom w:val="single" w:sz="4" w:color="D3D3D3"/><w:left w:val="none"/><w:right w:val="none"/></w:tcBorders></w:tcPr><w:p><w:r><w:rPr><w:rFonts w:ascii="Lato" w:hAnsi="Lato"/><w:sz w:val="22"/></w:rPr><w:t>${cleanXml(proj.name)}</w:t></w:r></w:p></w:tc>
            <w:tc><w:tcPr><w:tcW w:w="1600" w:type="dxa"/><w:tcBorders><w:bottom w:val="single" w:sz="4" w:color="D3D3D3"/><w:left w:val="none"/><w:right w:val="none"/></w:tcBorders></w:tcPr><w:p><w:r><w:rPr><w:rFonts w:ascii="Lato" w:hAnsi="Lato"/><w:sz w:val="22"/></w:rPr><w:t>${cleanXml(proj.tech)}</w:t></w:r></w:p></w:tc>
            <w:tc><w:tcPr><w:tcW w:w="4700" w:type="dxa"/><w:tcBorders><w:bottom w:val="single" w:sz="4" w:color="D3D3D3"/><w:left w:val="none"/><w:right w:val="none"/></w:tcBorders></w:tcPr><w:p><w:r><w:rPr><w:rFonts w:ascii="Lato" w:hAnsi="Lato"/><w:sz w:val="22"/></w:rPr><w:t>${cleanXml(proj.desc)}</w:t></w:r></w:p></w:tc>
            <w:tc><w:tcPr><w:tcW w:w="1500" w:type="dxa"/><w:tcBorders><w:bottom w:val="single" w:sz="4" w:color="D3D3D3"/><w:left w:val="none"/><w:right w:val="none"/></w:tcBorders></w:tcPr><w:p><w:r><w:rPr><w:rFonts w:ascii="Lato" w:hAnsi="Lato"/><w:sz w:val="22"/></w:rPr><w:t>${cleanXml(proj.duration)}</w:t></w:r></w:p></w:tc>
          </w:tr>
        `;
      });

      // 4. Combined Document Framework Base String Setup
      const docxMainEnvelopeHeader = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
        <w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
        <w:body>
          <w:p>
            <w:pPr><w:spacing w:after="240"/></w:pPr>
            <w:r><w:rPr><w:rFonts w:ascii="Lato" w:hAnsi="Lato"/><w:b/><w:sz w:val="36"/><w:color w:val="000000"/></w:rPr><w:t>${cleanXml(target.name)}</w:t></w:r>
          </w:p>

          ${metaXmlBlock}

          <w:p><w:pPr><w:spacing w:before="240" w:after="120"/></w:pPr>
            <w:r><w:rPr><w:rFonts w:ascii="Lato" w:hAnsi="Lato"/><w:b/><w:sz w:val="26"/><w:color w:val="000000"/></w:rPr><w:t>Tool Expertise</w:t></w:r>
          </w:p>

          ${toolXmlBlock}

          <w:p><w:pPr><w:spacing w:before="300" w:after="60"/></w:pPr>
            <w:r><w:rPr><w:rFonts w:ascii="Lato" w:hAnsi="Lato"/><w:b/><w:sz w:val="26"/><w:color w:val="000000"/></w:rPr><w:t>Layout Project Experience</w:t></w:r>
          </w:p>
          <w:p><w:pPr><w:spacing w:after="160"/></w:pPr>
            <w:r><w:rPr><w:rFonts w:ascii="Lato" w:hAnsi="Lato"/><w:i/><w:sz w:val="18"/><w:color w:val="555555"/></w:rPr><w:t>(If you have done one project on multiple technology nodes, mention it sequentially)</w:t></w:r>
          </w:p>

          <w:tbl>
            <w:tblPr>
              <w:tblW w:w="10000" w:type="pct"/>
              <w:tblCellMar>
                <w:top w:w="120" w:type="dxa"/>
                <w:bottom w:w="120" w:type="dxa"/>
                <w:left w:w="140" w:type="dxa"/>
                <w:right w:w="140" w:type="dxa"/>
              </w:tblCellMar>
            </w:tblPr>
      `;

      const docxMainEnvelopeFooter = `
          </w:tbl>
        </w:body>
        </w:document>
      `;

      const comprehensivePayloadContent = docxMainEnvelopeHeader + tableRowsXml + docxMainEnvelopeFooter;

      // Convert layout profile structures to deployment streams
      const textEncoderInstance = new TextEncoder();
      const outputBinaryStreamBytes = textEncoderInstance.encode(comprehensivePayloadContent);

      const filePackageBlob = new Blob([outputBinaryStreamBytes], { type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
      const temporaryDownloadUrl = URL.createObjectURL(filePackageBlob);
      
      const downloadTriggerAnchor = document.createElement("a");
      downloadTriggerAnchor.href = temporaryDownloadUrl;
      downloadTriggerAnchor.download = `${target.name.replace(/\s+/g, '_')}_Layout_Portfolio.docx`;
      document.body.appendChild(downloadTriggerAnchor);
      downloadTriggerAnchor.click();
      
      document.body.removeChild(downloadTriggerAnchor);
      URL.revokeObjectURL(temporaryDownloadUrl);
      showToast("✓ Profile document package downloaded matching layout specifications.");
    }

    window.addEventListener('DOMContentLoaded', () => {
      renderDirectory();
    });
  </script>
</body>
</html>
